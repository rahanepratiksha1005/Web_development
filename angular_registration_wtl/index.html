<!DOCTYPE html>
<html ng-app="registerApp">
<head>
    <title>AngularJS Registration</title>

    <!-- AngularJS CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <style>
        body { font-family: Arial; background:#f2f2f2; }
        .box {
            width:300px;
            margin:50px auto;
            padding:20px;
            background:white;
            border-radius:8px;
            box-shadow:0 0 10px gray;
        }
        input { width:100%; padding:8px; margin:8px 0; }
        button {
            width:100%;
            padding:10px;
            background:green;
            color:white;
            border:none;
        }
    </style>
</head>

<body ng-controller="RegController">

<div class="box">
    <h2>Registration Form</h2>

    <form ng-submit="register()">

        <input type="text" placeholder="First Name" ng-model="user.firstname" required>

        <input type="text" placeholder="Last Name" ng-model="user.lastname" required>

        <input type="text" placeholder="Username" ng-model="user.username" required>

        <input type="password" placeholder="Password" ng-model="user.password" required>

        <button type="submit">Register</button>
    </form>

    <div ng-if="submitted">
        <h3>Registered Successfully!</h3>
        <p>Name: {{user.firstname}} {{user.lastname}}</p>
        <p>Username: {{user.username}}</p>
    </div>
</div>

<script>
var app = angular.module("registerApp", []);

app.controller("RegController", function($scope){
    $scope.user = {};
    $scope.submitted = false;

    $scope.register = function(){
        $scope.submitted = true;
    };
});
</script>

</body>
</html>
