<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${task.id != null} ? 'Edit Task' : 'Add Task'"></title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 400px; }
        label { display: block; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; }
        textarea { height: 100px; }
        .error { color: red; }
        .btn { padding: 10px 15px; margin-top: 10px; border: none; cursor: pointer; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
    </style>
</head>
<body>
    <h1 th:text="${task.id != null} ? 'Edit Task' : 'Add Task'"></h1>
    <form th:action="@{/tasks/save}" th:object="${task}" method="post">
        <input type="hidden" th:field="*{id}" />
        <label for="title">Title:</label>
        <input type="text" th:field="*{title}" id="title" required />
        <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error"></span>

        <label for="description">Description:</label>
        <textarea th:field="*{description}" id="description"></textarea>

        <label for="deadline">Deadline:</label>
        <input type="date" th:field="*{deadline}" id="deadline" required />
        <span th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}" class="error"></span>

        <label for="status">Status:</label>
        <select th:field="*{status}" id="status" required>
            <option value="">Select Status</option>
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
        </select>
        <span th:if="${#fields.hasErrors('status')}" th:errors="*{status}" class="error"></span>

        <label for="employee">Assign to Employee:</label>
        <select th:field="*{employee}" id="employee">
            <option value="">Select Employee</option>
            <option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.name}"></option>
        </select>

        <button type="submit" class="btn btn-primary">Save</button>
        <a href="/tasks" class="btn btn-secondary">Cancel</a>
    </form>
</body>
</html>
